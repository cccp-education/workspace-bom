# ── Gradle tooling ────────────────────────────────────────────────────────────
plugin-publish = "2.1.0"
kover = "0.9.1"

# ── Plugin versions (published by education.cccp) ────────────────────────────
slider = "0.0.7"
codebase = "0.0.1"

# ── PDF/Extraction ────────────────────────────────────────────────────────────
asciidoctorj = "3.0.0"
pdfbox = "3.0.4"
tika = "3.1.0"

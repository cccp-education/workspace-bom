[versions]
# ── Workspace BOM shared versions ─────────────────────────────────────────────
workspace-bom = "0.1.0"

# ── Kotlin ────────────────────────────────────────────────────────────────────
kotlin = "2.3.20"
kotlinx-serial = "1.7.3"
coroutines = "1.10.2"

# ── Framework ─────────────────────────────────────────────────────────────────
jackson = "2.21.2"
langchain4j = "1.14.1"
langchain4j-beta = "1.14.1-beta24"
koog = "0.8.0"

# ── Database ──────────────────────────────────────────────────────────────────
r2dbc-postgresql = "1.0.7.RELEASE"
